version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: capsule_db
    environment:
      POSTGRES_USER: capsule_user
      POSTGRES_PASSWORD: capsule_password
      POSTGRES_DB: capsule_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capsule_user -d capsule_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capsule_backend
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - full  # only starts with: docker-compose --profile full up

volumes:
  postgres_data:
